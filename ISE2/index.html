<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Ecommerce</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --danger: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 15px;
    }

    .product {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }

    .product img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .price {
      color: var(--muted);
      margin-bottom: 8px;
    }

    button {
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
    }

    .add-btn {
      background: var(--primary);
      color: white;
      width: 100%;
    }

    .cart {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 15px;
      height: fit-content;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .remove-btn {
      background: var(--danger);
      color: white;
    }

    .total {
      margin-top: 10px;
      font-weight: bold;
      text-align: right;
    }

    .empty {
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  🛍️ My Ecommerce Store
</header>

<div class="container">
  <div>
    <h2>Products</h2>
    <div id="productList" class="products"></div>
  </div>

  <div class="cart">
    <h2>Cart</h2>
    <div id="cartItems"></div>
    <div class="total">Total: ₹<span id="total">0</span></div>
  </div>
</div>

<script>
  const products = [
    { id: 1, name: "Shirt", price: 500, img: "https://picsum.photos/200?1" },
    { id: 2, name: "Shoes", price: 1200, img: "https://picsum.photos/200?2" },
    { id: 3, name: "Watch", price: 800, img: "https://picsum.photos/200?3" },
    { id: 4, name: "Bag", price: 700, img: "https://picsum.photos/200?4" }
  ];

  let cart = [];

  function renderProducts() {
    const productList = document.getElementById("productList");
    productList.innerHTML = "";

    products.forEach(p => {
      const div = document.createElement("div");
      div.className = "product";
      div.innerHTML = `
        <img src="${p.img}" />
        <h3>${p.name}</h3>
        <p class="price">₹${p.price}</p>
        <button class="add-btn" onclick="addToCart(${p.id})">Add to Cart</button>
      `;
      productList.appendChild(div);
    });
  }

  function addToCart(id) {
    const product = products.find(p => p.id === id);
    cart.push(product);
    renderCart();
  }

  function removeFromCart(index) {
    cart.splice(index, 1);
    renderCart();
  }

  function renderCart() {
    const cartItems = document.getElementById("cartItems");
    const totalEl = document.getElementById("total");

    cartItems.innerHTML = "";
    let total = 0;

    if (cart.length === 0) {
      cartItems.innerHTML = '<div class="empty">Cart is empty</div>';
    }

    cart.forEach((item, index) => {
      total += item.price;
      const div = document.createElement("div");
      div.className = "cart-item";
      div.innerHTML = `
        <span>${item.name} - ₹${item.price}</span>
        <button class="remove-btn" onclick="removeFromCart(${index})">Remove</button>
      `;
      cartItems.appendChild(div);
    });

    totalEl.textContent = total;
  }

  renderProducts();
</script>

</body>
</html>
